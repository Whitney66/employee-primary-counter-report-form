<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>员工主责柜组关系管理填报表原型</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: #0f2742;
      background: #f4f7fb;
      font-size: 14px;
    }
    .topbar {
      height: 56px;
      background: #2873e6;
      color: #fff;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 28px;
      box-shadow: 0 2px 8px rgba(22, 74, 148, .18);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-size: 21px; font-weight: 700; min-width: 220px; }
    .logo {
      width: 32px; height: 32px; border-radius: 9px;
      background: conic-gradient(from 45deg, #35b779, #2c9beb, #f5b342, #35b779);
      position: relative;
    }
    .logo:after { content: ""; position: absolute; inset: 8px; background: #2873e6; border-radius: 5px; }
    .nav { display: flex; align-items: center; gap: 34px; height: 100%; flex: 1; }
    .nav span { opacity: .96; font-size: 14px; height: 100%; display: flex; align-items: center; }
    .nav .active {
      color: #0b4cae; background: #f6f9ff; padding: 0 24px; margin-left: 2px;
      font-weight: 700; clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 100%, 0 100%);
    }
    .search { display: flex; align-items: center; gap: 14px; }
    .search input { width: 188px; height: 32px; border: none; border-radius: 6px; padding: 0 34px 0 16px; outline: none; }
    .icon { opacity: .95; font-size: 17px; }

    .tabs {
      height: 38px; background: #fff; display: flex; align-items: center; gap: 6px;
      padding: 0 10px; border-bottom: 1px solid #d7e0ec;
    }
    .tab { height: 26px; line-height: 26px; padding: 0 12px; border: 1px solid #cfd9e6; border-radius: 3px; background: #f7fbff; color: #2a405f; }
    .tab.active { background: #1882e8; color: #fff; border-color: #1882e8; }

    .page { padding: 14px 18px 24px; }
    .filter-card, .table-card, .drawer { background: #fff; border: 1px solid #d9e3f0; box-shadow: 0 1px 4px rgba(16,45,80,.04); }
    .filter-card {
      min-height: 64px; padding: 12px 16px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    }
    .form-item { display: flex; align-items: center; gap: 9px; }
    .form-item label { color: #1d3859; white-space: nowrap; }
    .input, .select {
      height: 32px; border: 1px solid #cbd8e8; border-radius: 3px; background: #fff; padding: 0 10px;
      color: #223b5a; min-width: 168px; outline: none;
    }
    .month-picker { position: relative; display: inline-flex; align-items: center; }
    .month-picker .input, .month-picker input { padding-right: 34px; }
    .month-picker:after {
      content: ""; position: absolute; right: 11px; width: 14px; height: 14px; pointer-events: none;
      background:
        linear-gradient(#6c7f98, #6c7f98) 3px 5px / 8px 1px no-repeat,
        linear-gradient(#6c7f98, #6c7f98) 3px 8px / 8px 1px no-repeat,
        linear-gradient(#6c7f98, #6c7f98) 3px 11px / 5px 1px no-repeat;
      border: 1px solid #6c7f98; border-radius: 2px;
    }
    .month-picker:before {
      content: ""; position: absolute; right: 13px; top: 8px; width: 10px; height: 3px; pointer-events: none;
      border-top: 2px solid #6c7f98; border-bottom: 1px solid #6c7f98;
    }
    .select { appearance: none; background-image: linear-gradient(45deg, transparent 50%, #6c7f98 50%), linear-gradient(135deg, #6c7f98 50%, transparent 50%); background-position: calc(100% - 16px) 13px, calc(100% - 11px) 13px; background-size: 5px 5px; background-repeat: no-repeat; }
    .multi-select-wrap { position: relative; }
    .multi-select-input { cursor: pointer; padding-right: 32px; background: #fff; }
    .multi-select-input:after { content: ""; position: absolute; right: 12px; top: 13px; border: 5px solid transparent; border-top-color: #6c7f98; }
    .multi-select-panel {
      display: none; position: absolute; left: 0; top: 36px; width: 220px; background: #fff; z-index: 12;
      border: 1px solid #c7d4e5; box-shadow: 0 10px 24px rgba(45, 72, 110, .18); border-radius: 2px; padding: 6px 0;
    }
    .multi-select-wrap.open .multi-select-panel { display: block; }
    .multi-option { height: 32px; display: flex; align-items: center; gap: 10px; padding: 0 12px; cursor: pointer; }
    .multi-option:hover { background: #eef6ff; color: #0b72dc; }
    .checkbox.checked { background: #1882e8; border-color: #1882e8; position: relative; }
    .checkbox.checked:after { content: "✓"; color: #fff; position: absolute; left: 2px; top: -3px; font-size: 13px; }
    .btn {
      border: none; height: 32px; padding: 0 16px; border-radius: 4px; cursor: pointer; font-weight: 600;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: #1882e8; color: #fff; }
    .btn-light { background: #eef5ff; color: #2071cb; }
    .btn-outline { background: #fff; color: #006fe8; border: 1px solid #b9d4f6; }
    .btn-disabled { background: #eef2f7; color: #9aa9ba; border: 1px solid #d4dde9; cursor: not-allowed; }
    .btn-ghost { background: #fff; color: #2071cb; border: 1px solid #c6daf4; }
    .toolbar { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; }
    .toolbar-left, .toolbar-right { display: flex; gap: 10px; align-items: center; }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border: 1px solid #d7e2f0; height: 43px; padding: 0 12px; text-align: center; color: #0d2747; }
    th { background: #f2f6fb; font-weight: 700; }
    tr:nth-child(even) td { background: #fbfdff; }
    tr:hover td { background: #eef7ff; }
    .checkbox { width: 14px; height: 14px; border: 1px solid #9aa9ba; border-radius: 2px; display: inline-block; background: #fff; vertical-align: middle; }
    .tag { display: inline-flex; align-items: center; height: 22px; padding: 0 8px; border-radius: 11px; font-size: 12px; }
    .tag.yes { background: #e8f7ef; color: #12945b; border: 1px solid #b9e9d0; }
    .tag.no { background: #f1f5fa; color: #64748b; border: 1px solid #d7e0ec; }
    .link { color: #006fe8; cursor: pointer; margin: 0 5px; text-decoration: none; }

    .cascade-wrap { position: relative; }
    .cascade-panel {
      display: none; position: absolute; z-index: 10; left: 0; top: 36px; width: 610px; height: 266px; background: #fff;
      border: 1px solid #c7d4e5; box-shadow: 0 10px 24px rgba(45, 72, 110, .18); border-radius: 2px;
    }
    .cascade-wrap.open .cascade-panel { display: flex; }
    .col { width: 33.33%; border-right: 1px solid #e0e7f1; overflow: auto; padding: 6px 0; }
    .col:last-child { border-right: none; }
    .tree-row { height: 32px; display: flex; align-items: center; gap: 10px; padding: 0 12px; cursor: pointer; }
    .tree-row:hover, .tree-row.selected { background: #eef6ff; color: #0b72dc; }
    .tree-row .arrow { margin-left: auto; color: #8aa0ba; }
    .counter-cascade .cascade-panel { width: 760px; height: 360px; }
    .counter-cascade .col { width: 33.33%; position: relative; }
    .counter-cascade .tree-row { height: 54px; justify-content: center; font-size: 16px; gap: 18px; }
    .counter-cascade .tree-row .checkbox { position: absolute; left: 24px; }
    .counter-cascade .tree-row .arrow { position: absolute; right: 18px; margin-left: 0; }

    .drawer-mask { display: none; position: fixed; inset: 0; background: rgba(8, 24, 44, .28); z-index: 20; }
    .drawer {
      position: fixed; right: -520px; top: 0; bottom: 0; width: 520px; z-index: 21; transition: right .25s ease;
      display: flex; flex-direction: column;
    }
    body.drawer-open .drawer-mask { display: block; }
    body.drawer-open .drawer { right: 0; }
    .drawer-header { height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid #dce6f2; font-size: 17px; font-weight: 700; }
    .drawer-body { padding: 22px 24px; flex: 1; overflow: auto; }
    .drawer-footer { height: 58px; border-top: 1px solid #dce6f2; display: flex; justify-content: flex-end; align-items: center; gap: 10px; padding: 0 20px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; margin-bottom: 8px; color: #30465f; }
    .field label:before { content: "*"; color: #ef4444; margin-right: 4px; }
    .field input, .field select { width: 100%; height: 36px; border: 1px solid #cbd8e8; border-radius: 4px; padding: 0 10px; outline: none; }
    .radio-group { display: flex; gap: 18px; height: 36px; align-items: center; }
    .radio { display: flex; gap: 7px; align-items: center; cursor: pointer; }
    .radio i { width: 15px; height: 15px; border-radius: 50%; border: 1px solid #98a9bd; display: inline-block; position: relative; }
    .radio.active i { border-color: #1882e8; }
    .radio.active i:after { content: ""; position: absolute; inset: 3px; background: #1882e8; border-radius: 50%; }
    .toast { display: none; position: fixed; top: 74px; left: 50%; transform: translateX(-50%); background: #102a46; color: #fff; padding: 10px 18px; border-radius: 4px; z-index: 50; box-shadow: 0 8px 22px rgba(0,0,0,.16); }
    .toast.show { display: block; animation: fade 1.8s ease both; }
    @keyframes fade { 0%{opacity:0; transform:translate(-50%,-8px)} 15%,75%{opacity:1; transform:translate(-50%,0)} 100%{opacity:0; transform:translate(-50%,-8px)} }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="logo"></div>大数据平台</div>
    <div class="nav">
      <span>‹</span><span>分析</span><span>库存分析</span><span>顾客分析</span><span>采购分析</span><span>提货分析</span><span>风险管控</span><span>离线分析</span><span>自定义分析</span><span class="active">数据填报</span>
    </div>
    <div class="search"><input placeholder="搜索" /><span class="icon">♧</span><span class="icon">⛶</span><span class="icon">●</span></div>
  </div>
  <div class="tabs"><div class="tab">经营看板 ×</div><div class="tab active">员工主责柜组关系管理 ×</div></div>

  <div class="page">
    <div class="filter-card">
      <div class="form-item multi-select-wrap" id="storeMulti">
        <label>门店</label><input class="input multi-select-input" id="storeFilter" value="7222" readonly onclick="toggleStoreMulti()" />
        <div class="multi-select-panel">
          <div class="multi-option" onclick="toggleStoreOption(event)"><span class="checkbox checked" id="storeCheck"></span>7222</div>
        </div>
      </div>
      <div class="form-item cascade-wrap" id="cascade">
        <label>团队名称</label><input class="input" id="teamFilter" placeholder="请选择团队名称" readonly onclick="toggleCascade()" />
        <div class="cascade-panel" style="width:220px; height:auto;">
          <div class="col" style="width:100%; border-right:none;">
            <div class="tree-row" onclick="pickTeam('T3香化')"><span class="checkbox"></span>T3香化</div>
            <div class="tree-row" onclick="pickTeam('T3烟酒')"><span class="checkbox"></span>T3烟酒</div>
            <div class="tree-row" onclick="pickTeam('T3精品专卖')"><span class="checkbox"></span>T3精品专卖</div>
            <div class="tree-row" onclick="pickTeam('T3精品综合')"><span class="checkbox"></span>T3精品综合</div>
            <div class="tree-row" onclick="pickTeam('T3入境')"><span class="checkbox"></span>T3入境</div>
          </div>
        </div>
      </div>
      <div class="form-item cascade-wrap counter-cascade" id="counterCascade">
        <label>柜组</label><input class="input" id="counterFilter" placeholder="请选择柜组" readonly onclick="toggleCounterCascade()" />
        <div class="cascade-panel">
          <div class="col"><div class="tree-row selected"><span class="checkbox checked"></span>7222</div></div>
          <div class="col" id="counterTeams"></div>
          <div class="col" id="counterList"></div>
        </div>
      </div>
      <div class="form-item"><label>月份</label><span class="month-picker"><input class="input" value="2026-07" readonly /></span></div>
      <div class="form-item"><label>工号</label><input class="input" placeholder="请输入工号" /></div>
      <div class="form-item"><label>姓名</label><input class="input" placeholder="请输入姓名" /></div>
      <button class="btn btn-primary" onclick="toast('查询成功')">⌕ 查询</button><button class="btn btn-light" onclick="toast('已重置查询条件')">↻ 重置</button>
    </div>

    <div class="toolbar">
      <div class="toolbar-left"><button class="btn btn-primary" onclick="openDrawer('新增关系')">新增</button><button class="btn btn-disabled" onclick="toast('请先选择一条数据')">修改</button><button class="btn btn-outline" onclick="toast('导入弹窗示意')">导入</button><button class="btn btn-disabled" onclick="toast('请选择要删除的数据')">▥ 批量删除</button></div>
      <div class="toolbar-right"></div>
    </div>

    <div class="table-card">
      <table>
        <thead><tr><th style="width:50px"><span class="checkbox"></span></th><th>团队</th><th>主责柜组</th><th>月份</th><th>姓名</th><th>角色</th><th>团队目标销售额（元）</th><th>最后更新人</th><th>最后更新时间</th><th style="width:180px">操作</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="drawer-mask" onclick="closeDrawer()"></div>
  <div class="drawer">
    <div class="drawer-header"><span id="drawerTitle">新增关系</span><span onclick="closeDrawer()" style="cursor:pointer">×</span></div>
    <div class="drawer-body">
      <div class="field"><label>门店</label><select><option>7222</option></select></div>
      <div class="field"><label>团队名称</label><select><option>T3香化</option><option>T3烟酒</option><option>T3精品专卖</option><option>T3精品综合</option><option>T3入境</option></select></div>
      <div class="field"><label>月份</label><span class="month-picker"><input value="2026-07" readonly /></span></div>
      <div class="field"><label>姓名</label><input id="nameInput" placeholder="请输入姓名" value="" /></div>
      <div class="field"><label>角色</label><select><option>总店长</option><option>店长</option><option>店助</option></select></div>
      <div class="field"><label>团队目标销售额（元）</label><input placeholder="请输入团队目标销售额" value="56000" /></div>
    </div>
    <div class="drawer-footer"><button class="btn btn-ghost" onclick="closeDrawer()">取消</button><button class="btn btn-primary" onclick="saveForm()">保存</button></div>
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const counterGroups = {
      'T3香化': ['72222201','72222401','72221301','72222501'],
      'T3烟酒': ['72221201','72221501','72222301','72222901'],
      'T3精品专卖': ['72221601','72221602','72221603','72221604','72221605','72221607','72221801','72221704','72222801','72222802','72222803','72222804','72222805','72222806'],
      'T3精品综合': ['72221401','72221606','72221701','72221702','72221802','72221901','72221902','72222601','72222602','72222603','72222604','72222701','72222702','72223001'],
      'T3入境': ['72225101','72225102','72225103','72225104']
    };
    const names = ['蔡海晓','唐伟','陈亚琳','胡巧菊','王一诺','赵敏','李明','刘佳','周晴','吴越','孙晨','黄静'];
    const roles = ['总店长','店长','店助'];
    const selectedCounters = new Set();
    const rows = Object.entries(counterGroups).flatMap(([team, counters]) => counters.map((counter, index) => [
      team,
      counter,
      '2026-07',
      names[(index + team.length) % names.length],
      roles[index % roles.length],
      (23500 + index * 3500).toLocaleString('zh-CN'),
      names[(index + 3) % names.length],
      '2026-07-03 ' + String(10 + index % 7).padStart(2, '0') + ':' + String(16 + index).padStart(2, '0') + ':24'
    ]));
    function render() {
      document.getElementById('tbody').innerHTML = rows.map(r => `<tr><td><span class="checkbox"></span></td><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td><td>${r[5]}</td><td>${r[6]}</td><td>${r[7]}</td><td><a class="link" onclick="openDrawer('复制关系')">复制</a><a class="link" onclick="openDrawer('修改关系','${r[3]}')">修改</a><a class="link" onclick="toast('删除确认示意')">删除</a></td></tr>`).join('');
    }
    function renderCounterTeams(activeTeam = Object.keys(counterGroups)[0]) {
      document.getElementById('counterTeams').innerHTML = Object.keys(counterGroups).map(team => `<div class="tree-row ${team === activeTeam ? 'selected' : ''}" onclick="renderCounterTeams('${team}')"><span class="checkbox"></span>${team}<span class="arrow">›</span></div>`).join('');
      document.getElementById('counterList').innerHTML = counterGroups[activeTeam].map(counter => `<div class="tree-row" onclick="toggleCounterOption(event,'${counter}')"><span class="checkbox ${selectedCounters.has(counter) ? 'checked' : ''}"></span>${counter}</div>`).join('');
    }
    function toggleCounterCascade(){ document.getElementById('counterCascade').classList.toggle('open'); renderCounterTeams(); }
    function toggleCounterOption(event, counter){
      event.stopPropagation();
      selectedCounters.has(counter) ? selectedCounters.delete(counter) : selectedCounters.add(counter);
      document.getElementById('counterFilter').value = [...selectedCounters].join(',');
      renderCounterTeams(document.querySelector('#counterTeams .selected').innerText.replace('›','').trim());
    }
    function toggleStoreMulti(){ document.getElementById('storeMulti').classList.toggle('open'); }
    function toggleStoreOption(event){
      event.stopPropagation();
      const check = document.getElementById('storeCheck');
      check.classList.toggle('checked');
      document.getElementById('storeFilter').value = check.classList.contains('checked') ? '7222' : '';
    }
    function toggleCascade(){ document.getElementById('cascade').classList.toggle('open'); }
    function pickTeam(v){ document.getElementById('teamFilter').value = v; document.getElementById('cascade').classList.remove('open'); }
    function openDrawer(title, name=''){ document.getElementById('drawerTitle').innerText = title; document.getElementById('nameInput').value = name; document.body.classList.add('drawer-open'); }
    function closeDrawer(){ document.body.classList.remove('drawer-open'); }
    function saveForm(){ closeDrawer(); toast('保存成功，列表已更新'); }
    function toast(msg){ const t=document.getElementById('toast'); t.innerText=msg; t.classList.remove('show'); void t.offsetWidth; t.classList.add('show'); }
    document.addEventListener('click', e => {
      if(!e.target.closest('#cascade')) document.getElementById('cascade').classList.remove('open');
      if(!e.target.closest('#counterCascade')) document.getElementById('counterCascade').classList.remove('open');
      if(!e.target.closest('#storeMulti')) document.getElementById('storeMulti').classList.remove('open');
    });
    renderCounterTeams();
    render();
  </script>
</body>
</html>
